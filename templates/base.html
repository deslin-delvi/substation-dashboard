<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      (function() {
        var t = localStorage.getItem('sparc-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Substation Safety Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body class="scada-body">
    <button id="theme-toggle-btn" title="Toggle theme" aria-label="Toggle light/dark theme">
      <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
    </button>
    <nav class="navbar navbar-expand-lg navbar-dark sparc-navbar">
        <div class="container-fluid">
            <span class="navbar-brand sparc-brand mb-0 h1">
                <i class="bi bi-shield-check"></i> SPARC - Substation Protection and Risk Control
                <span class="badge badge-live-system ms-2">LIVE</span>
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            {% if current_user.is_authenticated %}
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item mx-2">
                        <a class="nav-link sparc-nav-link" href="/">
                            <i class="bi bi-house"></i> Live Dashboard
                        </a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link sparc-nav-link" href="/violations">
                            <i class="bi bi-exclamation-triangle"></i> Violations
                        </a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link sparc-nav-link" href="/cameras">
                            <i class="bi bi-camera-video"></i> CCTV Cameras
                        </a>
                    </li>
                    <li class="nav-item mx-3">
                        <span class="navbar-text text-white">
                            <i class="bi bi-person-circle"></i> {{ current_user.username }}
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link btn btn-outline-light btn-sm px-3" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
            {% endif %}
        </div>
    </nav>

    <!-- ── Yard PPE Alert Banner (global, shown on all pages) ── -->
    <style>
      @keyframes yard-alert-pulse {
        0%, 100% { background-color: #b91c1c; }
        50%       { background-color: #dc2626; }
      }
      #yard-alert-banner {
        animation: yard-alert-pulse 1.2s ease-in-out infinite;
        border-bottom: 3px solid #fca5a5;
      }
      .yard-missing-badge {
        display: inline-block;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.5);
        color: #fff;
        font-weight: 700;
        font-size: 0.78rem;
        padding: 2px 10px;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-right: 4px;
      }
      #yard-alert-ack-btn {
        background: #fff;
        color: #b91c1c;
        border: none;
        font-weight: 700;
        font-size: 0.85rem;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s, transform 0.1s;
        white-space: nowrap;
      }
      #yard-alert-ack-btn:hover  { background: #fee2e2; transform: scale(1.03); }
      #yard-alert-ack-btn:disabled { opacity: 0.6; transform: none; }
    </style>

    <div id="yard-alert-banner"
         style="display:none; position:fixed; top:0; left:0; right:0; z-index:9999;
                color:#fff; padding:10px 20px;
                box-shadow:0 4px 16px rgba(0,0,0,0.6);">
      <div class="d-flex align-items-center gap-3">

        <!-- Icon -->
        <i class="bi bi-exclamation-octagon-fill flex-shrink-0"
           style="font-size:2rem; filter:drop-shadow(0 0 6px rgba(255,255,255,0.5));"></i>

        <!-- Text block -->
        <div class="flex-grow-1" style="min-width:0;">
          <!-- Row 1: title + camera name + time -->
          <div class="d-flex align-items-center gap-2 flex-wrap" style="line-height:1.2;">
            <span style="font-size:1rem; font-weight:800; letter-spacing:0.06em;
                         text-transform:uppercase;">
              🚨 Yard PPE Violation
            </span>
            <span id="yard-alert-camera"
                  style="font-size:0.95rem; font-weight:600;
                         background:rgba(0,0,0,0.25); padding:1px 8px; border-radius:4px;">
            </span>
            <span id="yard-alert-time"
                  style="font-size:0.8rem; opacity:0.75; margin-left:4px;"></span>
          </div>
          <!-- Row 2: missing items as pill badges -->
          <div class="d-flex align-items-center gap-1 mt-1 flex-wrap">
            <span style="font-size:0.82rem; opacity:0.85; margin-right:4px;">Missing PPE:</span>
            <span id="yard-alert-missing"></span>
          </div>
        </div>

        <!-- Thumbnail -->
        <img id="yard-alert-thumb" src="" alt="snapshot"
             style="height:70px; width:auto; border-radius:6px;
                    border:2px solid rgba(255,255,255,0.5);
                    box-shadow:0 2px 8px rgba(0,0,0,0.4);
                    display:none; flex-shrink:0;">

        <!-- Acknowledge button -->
        <button id="yard-alert-ack-btn" class="flex-shrink-0">
          <i class="bi bi-check-circle-fill me-1"></i> Acknowledge
        </button>

      </div>
    </div>

    <div class="container-fluid py-4" id="main-content">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script>
      (function() {
        var btn  = document.getElementById('theme-toggle-btn');
        var icon = document.getElementById('theme-icon');
        var html = document.documentElement;

        function applyTheme(theme) {
          html.setAttribute('data-theme', theme);
          localStorage.setItem('sparc-theme', theme);
          if (theme === 'light') {
            icon.className = 'bi bi-sun-fill';
          } else {
            icon.className = 'bi bi-moon-stars-fill';
          }
        }

        // Apply correct icon on load without triggering transition
        applyTheme(html.getAttribute('data-theme') || 'dark');

        btn.addEventListener('click', function() {
          var current = html.getAttribute('data-theme') || 'dark';
          applyTheme(current === 'dark' ? 'light' : 'dark');
        });
      })();
    </script>
</body>
</html>
